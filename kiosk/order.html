<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>สั่งซื้อส้ม O'Fresh</title>

    <link rel="icon" type="image/png" href="../favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; -webkit-box-sizing: border-box; box-sizing: border-box; }

        body {
            font-family: 'Prompt', 'Noto Sans Thai', 'Sarabun', Arial, sans-serif;
            background: -webkit-linear-gradient(315deg, #FFF5EB 0%, #FFF0E0 50%, #FFECD2 100%);
            background: linear-gradient(135deg, #FFF5EB 0%, #FFF0E0 50%, #FFECD2 100%);
            min-height: 100vh;
            display: -webkit-flex;
            display: flex;
            -webkit-flex-direction: column;
            flex-direction: column;
            -webkit-align-items: center;
            align-items: center;
            -webkit-justify-content: center;
            justify-content: center;
            padding: 40px 20px;
            -webkit-text-size-adjust: 100%;
        }

        /* ===== LOGO ===== */
        .logo-wrap {
            margin-bottom: 32px;
            text-align: center;
        }
        .logo-wrap img {
            height: 64px;
            width: auto;
            object-fit: contain;
        }

        /* ===== CARD ===== */
        .card {
            background: white;
            border-radius: 32px;
            padding: 48px 56px;
            box-shadow: 0 20px 60px rgba(255,107,0,0.15);
            text-align: center;
            max-width: 520px;
            width: 100%;
        }

        .card-title {
            font-size: 28px;
            font-weight: 800;
            color: #1A1A2E;
            margin-bottom: 8px;
        }

        .card-subtitle {
            font-size: 16px;
            color: #6B7280;
            font-weight: 300;
            margin-bottom: 36px;
            line-height: 1.6;
        }

        /* ===== QR CODE ===== */
        .qr-wrap {
            display: -webkit-inline-flex;
            display: inline-flex;
            -webkit-align-items: center;
            align-items: center;
            -webkit-justify-content: center;
            justify-content: center;
            padding: 20px;
            background: white;
            border: 3px solid #FF6B00;
            border-radius: 24px;
            margin-bottom: 32px;
            box-shadow: 0 8px 32px rgba(255,107,0,0.12);
        }

        #qrcode canvas,
        #qrcode img {
            display: block;
            border-radius: 8px;
        }

        /* ===== URL LABEL ===== */
        .url-label {
            display: -webkit-inline-flex;
            display: inline-flex;
            -webkit-align-items: center;
            align-items: center;
            background: rgba(255,107,0,0.08);
            border: 1px solid rgba(255,107,0,0.2);
            border-radius: 50px;
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 600;
            color: #FF6B00;
            margin-bottom: 36px;
            letter-spacing: 0.3px;
        }

        /* ===== DIVIDER ===== */
        .divider {
            height: 1px;
            background: rgba(0,0,0,0.06);
            margin-bottom: 28px;
        }

        /* ===== STEPS ===== */
        .steps {
            display: -webkit-flex;
            display: flex;
            -webkit-justify-content: center;
            justify-content: center;
            -webkit-flex-wrap: wrap;
            flex-wrap: wrap;
        }
        .step-item {
            display: -webkit-flex;
            display: flex;
            -webkit-flex-direction: column;
            flex-direction: column;
            -webkit-align-items: center;
            align-items: center;
            -webkit-flex: 1 1 120px;
            flex: 1 1 120px;
            padding: 0 12px;
            margin-bottom: 8px;
        }
        .step-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: -webkit-linear-gradient(315deg, #FF6B00, #E55A00);
            background: linear-gradient(135deg, #FF6B00, #E55A00);
            color: white;
            font-size: 18px;
            font-weight: 800;
            display: -webkit-flex;
            display: flex;
            -webkit-align-items: center;
            align-items: center;
            -webkit-justify-content: center;
            justify-content: center;
            margin-bottom: 10px;
            box-shadow: 0 4px 12px rgba(255,107,0,0.3);
        }
        .step-text {
            font-size: 13px;
            color: #2D2D2D;
            font-weight: 500;
            line-height: 1.5;
            text-align: center;
        }

        /* ===== FOOTER ===== */
        .footer-note {
            margin-top: 32px;
            font-size: 13px;
            color: #6B7280;
            font-weight: 300;
            text-align: center;
        }

        @media (max-width: 480px) {
            .card { padding: 36px 28px; }
            .card-title { font-size: 22px; }
        }
    </style>
</head>
<body>

    <div class="logo-wrap">
        <img src="../OFresh_Logo_transparent.png" alt="O'Fresh Logo">
    </div>

    <div class="card">
        <div class="card-title">สั่งซื้อส้มแมนดาริน</div>
        <div class="card-subtitle">สแกน QR Code ด้วยมือถือของคุณ<br>เพื่อกรอกข้อมูลสั่งซื้อได้เลย</div>

        <div class="qr-wrap">
            <div id="qrcode"></div>
        </div>

        <div class="url-label">ofresh.baanporjai.com/order.html</div>

        <div class="divider"></div>

        <div class="steps">
            <div class="step-item">
                <div class="step-circle">1</div>
                <div class="step-text">สแกน<br>QR Code</div>
            </div>
            <div class="step-item">
                <div class="step-circle">2</div>
                <div class="step-text">กรอก<br>ข้อมูล</div>
            </div>
            <div class="step-item">
                <div class="step-circle">3</div>
                <div class="step-text">รอทีมงาน<br>ติดต่อกลับ</div>
            </div>
        </div>
    </div>

    <div class="footer-note">ส้มแมนดารินไต้หวัน · ฿60/กก. · จัดส่งฟรี อ.เมือง เชียงใหม่</div>

    <!-- QR Code library (ES5, Android 9 compatible) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        var ORDER_URL = 'https://ofresh.baanporjai.com/order.html';

        function generateQR() {
            if (typeof QRCode === 'undefined') {
                // Fallback: แสดง URL ถ้า library โหลดไม่ได้
                var el = document.getElementById('qrcode');
                el.style.padding = '20px';
                el.style.fontSize = '12px';
                el.style.color = '#6B7280';
                el.style.wordBreak = 'break-all';
                el.textContent = ORDER_URL;
                return;
            }

            new QRCode(document.getElementById('qrcode'), {
                text: ORDER_URL,
                width: 240,
                height: 240,
                colorDark: '#1A1A2E',
                colorLight: '#FFFFFF',
                correctLevel: QRCode.CorrectLevel.M
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', generateQR);
        } else {
            generateQR();
        }
    </script>
</body>
</html>
