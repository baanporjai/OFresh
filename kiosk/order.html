<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>สั่งซื้อส้ม O'Fresh</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="order.css">
</head>
<body>
    <a href="index.html" class="btn-back">&#8592; กลับหน้าแรก</a>

    <div class="lang-switcher">
        <a href="order.html" class="lang-btn active">TH</a>
        <a href="order-en.html" class="lang-btn">EN</a>
        <a href="order-zh.html" class="lang-btn">中文</a>
        <a href="order-ja.html" class="lang-btn">日本語</a>
        <a href="order-ko.html" class="lang-btn">한국어</a>
    </div>

    <div class="logo-wrap">
        <img src="../OFresh_Logo_transparent.png" alt="O'Fresh Logo">
    </div>

    <div class="card">
        <div class="card-title">สั่งซื้อส้มแมนดาริน</div>
        <div class="card-subtitle">สแกน QR Code ด้วยมือถือของคุณ<br>เพื่อกรอกข้อมูลสั่งซื้อได้เลย</div>

        <div class="qr-wrap">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&color=1A1A2E&data=https://ofresh.baanporjai.com/order.html"
                 alt="QR Code สั่งซื้อส้ม O'Fresh" width="240" height="240">
        </div>

        <div class="url-label">ofresh.baanporjai.com/order.html</div>
        <div class="divider"></div>

        <div class="steps">
            <div class="step-item">
                <div class="step-circle">1</div>
                <div class="step-text">สแกน<br>QR Code</div>
            </div>
            <div class="step-item">
                <div class="step-circle">2</div>
                <div class="step-text">กรอก<br>ข้อมูล</div>
            </div>
            <div class="step-item">
                <div class="step-circle">3</div>
                <div class="step-text">รอทีมงาน<br>ติดต่อกลับ</div>
            </div>
        </div>
    </div>

    <div class="footer-note">ส้มแมนดารินไต้หวัน · ฿60/กก. · จัดส่งฟรี อ.เมือง เชียงใหม่</div>
</body>
</html>
