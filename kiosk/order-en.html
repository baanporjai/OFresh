<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Order Oranges — O'Fresh</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="order.css">
</head>
<body>
    <a href="index-en.html" class="btn-back">&#8592; Back to Home</a>

    <div class="lang-switcher">
        <a href="order.html" class="lang-btn">TH</a>
        <a href="order-en.html" class="lang-btn active">EN</a>
        <a href="order-zh.html" class="lang-btn">中文</a>
        <a href="order-ja.html" class="lang-btn">日本語</a>
        <a href="order-ko.html" class="lang-btn">한국어</a>
    </div>

    <div class="logo-wrap">
        <img src="../OFresh_Logo_transparent.png" alt="O'Fresh Logo">
    </div>

    <div class="card">
        <div class="card-title">Order Mandarin Oranges</div>
        <div class="card-subtitle">Scan the QR Code with your phone<br>to fill in your order details</div>

        <div class="qr-wrap">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&color=1A1A2E&data=https://ofresh.baanporjai.com/order.html"
                 alt="QR Code — O'Fresh Order" width="240" height="240">
        </div>

        <div class="url-label">ofresh.baanporjai.com/order.html</div>
        <div class="divider"></div>

        <div class="steps">
            <div class="step-item">
                <div class="step-circle">1</div>
                <div class="step-text">Scan<br>QR Code</div>
            </div>
            <div class="step-item">
                <div class="step-circle">2</div>
                <div class="step-text">Fill in<br>Details</div>
            </div>
            <div class="step-item">
                <div class="step-circle">3</div>
                <div class="step-text">Wait for<br>Our Team</div>
            </div>
        </div>
    </div>

    <div class="footer-note">Taiwanese Mandarin Oranges · ฿60/kg · Free delivery in Mueang Chiang Mai</div>
</body>
</html>
