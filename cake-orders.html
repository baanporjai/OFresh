<script>
// หน้านี้แสดงข้อมูลจากธุรกิจ Frozen Larna Cake ซึ่งเป็นระบบหลังบ้านคนละชุดกับ
// O'Fresh (Cloudflare Worker / PIN คนละตัว) จึงต้องล็อกอินแยกต่างหากจากแท็บอื่นๆ
const API_BASE = "https://larnaapi.yai-taweewoot.workers.dev";

(function(){
  if (!sessionStorage.getItem("dash_token")) {
    document.addEventListener("DOMContentLoaded", function() {
      document.body.style.display = "none";
      var overlay = document.createElement("div");
      overlay.id = "pin-overlay";
      overlay.innerHTML = `
        <div style="position:fixed;inset:0;background:#2B1810;display:flex;align-items:center;justify-content:center;z-index:9999;">
          <div style="background:#fff;border-radius:20px;padding:40px 32px;width:320px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.3);">
            <div style="font-size:32px;margin-bottom:8px;">🔐</div>
            <h2 style="font-size:18px;font-weight:800;color:#2B1810;margin-bottom:4px;">Larna Dashboard</h2>
            <p style="font-size:13px;color:#888;margin-bottom:24px;">กรอก PIN เพื่อเข้าใช้งาน</p>
            <input id="pin-input" type="password" inputmode="numeric" maxlength="6"
              style="width:100%;text-align:center;font-size:28px;letter-spacing:8px;border:2px solid #e0d0c0;border-radius:12px;padding:12px;outline:none;color:#2B1810;"
              placeholder="••••••">
            <p id="pin-error" style="color:#c0392b;font-size:13px;margin-top:12px;display:none;">PIN ไม่ถูกต้อง ลองใหม่อีกครั้ง</p>
            <button onclick="checkPin()" style="margin-top:20px;width:100%;background:#2B1810;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;">เข้าสู่ระบบ</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      document.body.style.display = "";
      setTimeout(() => document.getElementById("pin-input").focus(), 100);
      document.getElementById("pin-input").addEventListener("keydown", function(e) {
        if (e.key === "Enter") checkPin();
      });
    });
  }
  window.checkPin = async function() {
    var input = document.getElementById("pin-input");
    var errorEl = document.getElementById("pin-error");
    errorEl.style.display = "none";
    try {
      const res = await fetch(API_BASE + "/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pin: input.value }),
      });
      const data = await res.json();
      if (data.success && data.token) {
        sessionStorage.setItem("dash_token", data.token);
        document.getElementById("pin-overlay").remove();
        init();
      } else {
        errorEl.style.display = "";
        input.value = ""; input.focus();
      }
    } catch (e) {
      errorEl.textContent = "เชื่อมต่อไม่สำเร็จ ลองใหม่อีกครั้ง";
      errorEl.style.display = "";
    }
  };
})();
</script>

<div class="container">
  <div class="search-bar">
    <input type="text" id="searchInput" oninput="onSearchInput(this.value)" placeholder="ค้นหาชื่อลูกค้า เบอร์โทร หรือที่อยู่...">
  </div>
  <div id="content"><div class="loading-state">กำลังโหลดข้อมูล...</div></div>

<script>
let dailyChart, flavorChart, monthlyChart, allOrders = [];

let searchQuery = "";
function onSearchInput(val) {
  searchQuery = val.trim().toLowerCase();
  render(allOrders);
}
function matchesSearch(o) {
  if (!searchQuery) return true;
  return (o.name || "").toLowerCase().includes(searchQuery) || (o.phone || "").toString().includes(searchQuery) ||
    (o.address || "").toLowerCase().includes(searchQuery);
}

function sumInRange(orders, fromMs, toMs) {
  return orders.reduce((acc, o) => {
    const ts = parseTimestamp(o.timestamp);
    if (!ts) return acc;
    const t = ts.getTime();
    if (t >= fromMs && t < toMs) { acc.count++; acc.revenue += parseTotal(o.total); }
    return acc;
  }, { count: 0, revenue: 0 });
}

// จัดกลุ่มออเดอร์ตามที่อยู่ (ทั้งหมด ไม่กรองด้วยช่องค้นหา) เรียงตามจำนวนครั้งที่สั่งมากสุด
function buildAddressLeaderboard(orders) {
  const groups = {};
  orders.forEach(o => {
    const key = (o.address || "").trim();
    if (!key || key === "-") return;
    if (!groups[key]) groups[key] = { address: key, count: 0, revenue: 0, lastOrder: null };
    const g = groups[key];
    g.count++;
    g.revenue += parseTotal(o.total);
    const ts = parseTimestamp(o.timestamp);
    if (ts && (!g.lastOrder || ts > g.lastOrder)) g.lastOrder = ts;
  });
  const all = Object.values(groups).sort((a, b) => b.count - a.count);
  window._addressGroups = all.slice(0, 10);
  return { total: all.length, top: window._addressGroups };
}

// เปิด modal แสดงประวัติออเดอร์ทั้งหมดของที่อยู่นั้น (คลิกจากตาราง "ที่อยู่สั่งบ่อย")
function showAddressHistory(i) {
  const g = window._addressGroups && window._addressGroups[i];
  if (!g) return;
  const orders = allOrders.filter(o => (o.address || "").trim() === g.address)
    .sort((a, b) => (parseTimestamp(b.timestamp) || 0) - (parseTimestamp(a.timestamp) || 0));

  document.getElementById("modalTitle").textContent = "📍 " + g.address;
  const summary = `<div style="font-size:13px;color:var(--choco);opacity:.6;margin-bottom:14px;">${orders.length} ครั้ง · ${g.revenue.toLocaleString("th-TH")} THB</div>`;
  document.getElementById("modalBody").innerHTML = summary +
    (orders.length === 0 ? '<div class="empty">ไม่มีข้อมูล</div>' : orders.map(o => orderRowHTML(o)).join(""));
  document.getElementById("modalOverlay").classList.add("open");
}

// รวมยอดขายรายเดือน key แบบ Y-M เรียงลำดับได้ — ต่างจาก monthMap ใน openModal('revenue')
// ที่ key เป็น locale string ("กรกฎาคม 2569") เรียงตามตัวอักษรไม่ได้
function computeMonthlySeries(orders) {
  const monthMap = {};
  orders.forEach(o => {
    const ts = parseTimestamp(o.timestamp);
    if (!ts) return;
    const k = `${ts.getFullYear()}-${String(ts.getMonth() + 1).padStart(2, "0")}`;
    monthMap[k] = (monthMap[k] || 0) + parseTotal(o.total);
  });
  const sorted = Object.entries(monthMap).sort((a, b) => a[0].localeCompare(b[0]));
  return {
    labels: sorted.map(([k]) => {
      const [y, m] = k.split("-");
      return new Date(+y, +m - 1, 1).toLocaleDateString("th-TH", { month: "short", year: "2-digit" });
    }),
    data: sorted.map(([, v]) => v),
  };
}

function renderComparisonHTML(orders) {
  const now = Date.now();
  const DAY = 86400000;
  const startOfToday = new Date(); startOfToday.setHours(0, 0, 0, 0);
  const todayMs = startOfToday.getTime();

  const periods = [
    { label: "วันนี้ vs เมื่อวาน (ถึงตอนนี้)", cur: sumInRange(orders, todayMs, now), prev: sumInRange(orders, todayMs - DAY, todayMs) },
    { label: "7 วันล่าสุด vs 7 วันก่อนหน้า", cur: sumInRange(orders, now - 7 * DAY, now), prev: sumInRange(orders, now - 14 * DAY, now - 7 * DAY) },
    { label: "30 วันล่าสุด vs 30 วันก่อนหน้า", cur: sumInRange(orders, now - 30 * DAY, now), prev: sumInRange(orders, now - 60 * DAY, now - 30 * DAY) },
  ];

  return periods.map(p => {
    let pct, cls;
    if (p.prev.revenue > 0) {
      pct = (p.cur.revenue - p.prev.revenue) / p.prev.revenue * 100;
      cls = pct > 0.5 ? "up" : pct < -0.5 ? "down" : "flat";
    } else {
      pct = p.cur.revenue > 0 ? 100 : 0;
      cls = p.cur.revenue > 0 ? "up" : "flat";
    }
    const arrow = cls === "up" ? "↑" : cls === "down" ? "↓" : "→";
    return `
    <div class="compare-row">
      <div>
        <div class="compare-label">${p.label}</div>
        <div class="compare-values">${p.cur.revenue.toLocaleString("th-TH")} THB (${p.cur.count} ออเดอร์) เทียบกับ ${p.prev.revenue.toLocaleString("th-TH")} THB</div>
      </div>
      <div class="compare-delta ${cls}">${arrow} ${Math.abs(pct).toFixed(0)}%</div>
    </div>`;
  }).join("");
}

function openModal(type) {
  const overlay = document.getElementById("modalOverlay");
  const title = document.getElementById("modalTitle");
  const body = document.getElementById("modalBody");

  if (type === "all") {
    title.textContent = "📋 ออเดอร์ทั้งหมด";
    body.innerHTML = allOrders.length === 0
      ? '<div class="empty">ยังไม่มีออเดอร์</div>'
      : allOrders.slice().reverse().map(o => orderRowHTML(o)).join("");
  } else if (type === "today") {
    const today = todayISO();
    const todayList = allOrders.filter(isTodayOrder);
    title.textContent = "🚚 รายการจัดส่งวันนี้";
    body.innerHTML = todayList.length === 0
      ? '<div class="empty">ยังไม่มีออเดอร์สำหรับวันนี้</div>'
      : todayList.map(o => `
        <div class="order-row">
          <div>
            <div class="order-name">${o.name || "-"}</div>
            <div class="order-meta">📞 ${o.phone || "-"} &nbsp;·&nbsp; 📍 ${o.address || "-"}</div>
            <div class="order-items">🛍 ${o.items || "-"}</div>
            ${o.note && o.note !== "-" ? `<div class="order-note">📝 ${o.note}</div>` : ""}
          </div>
          <div class="order-total">${o.total}</div>
        </div>`).join("");
  } else if (type === "revenue") {
    title.textContent = "💰 ยอดขายรวม — แยกตามเดือน";
    const monthMap = {};
    allOrders.forEach(o => {
      const ts = parseTimestamp(o.timestamp);
      if (!ts) return;
      const key = ts.toLocaleDateString("th-TH", { month: "long", year: "numeric" });
      monthMap[key] = (monthMap[key] || 0) + parseTotal(o.total);
    });
    const rows = Object.entries(monthMap).reverse().map(([m, v]) =>
      `<div class="order-row"><div class="order-name">${m}</div><div class="order-total">${v.toLocaleString("th-TH")} THB</div></div>`
    ).join("");
    body.innerHTML = rows || '<div class="empty">ไม่มีข้อมูล</div>';
  } else if (type === "flavors") {
    title.textContent = "🏆 รสชาติขายดี — จำนวนทั้งหมด";
    const fm = {};
    allOrders.forEach(o => {
      parseItems(o.items).forEach(({name, qty}) => { fm[name] = (fm[name] || 0) + qty; });
    });
    const rows = Object.entries(fm).sort((a,b) => b[1]-a[1]).map(([name, qty]) =>
      `<div class="order-row"><div class="order-name">${name}</div><div class="order-total">${qty} ชิ้น</div></div>`
    ).join("");
    body.innerHTML = rows || '<div class="empty">ไม่มีข้อมูล</div>';
  } else if (type === "last30") {
    const cutoff = Date.now() - 30 * 86400000;
    const list = allOrders.filter(o => { const ts = parseTimestamp(o.timestamp); return ts && ts.getTime() >= cutoff; })
      .sort((a, b) => (parseTimestamp(b.timestamp) || 0) - (parseTimestamp(a.timestamp) || 0));
    title.textContent = "📆 ออเดอร์ 30 วันล่าสุด";
    body.innerHTML = list.length === 0 ? '<div class="empty">ยังไม่มีออเดอร์ในช่วงนี้</div>' : list.map(o => orderRowHTML(o)).join("");
  }

  overlay.classList.add("open");
}

function closeModal(e) {
  if (e && e.target !== document.getElementById("modalOverlay") && e.target !== document.querySelector(".modal-close")) return;
  document.getElementById("modalOverlay").classList.remove("open");
}

document.addEventListener("keydown", e => { if (e.key === "Escape") document.getElementById("modalOverlay").classList.remove("open"); });

const STATUS_CODES = ["รอยืนยัน", "ยืนยันแล้ว", "แพ็คแล้ว", "จัดส่งแล้ว", "ยกเลิก"];

// "จบเรื่องแล้ว" ไม่ต้องดำเนินการต่อ — ใช้จุดเดียวเทียบสถานะ แทนการเทียบ string "จัดส่งแล้ว" กระจายอยู่หลายที่
function isFinalStatus(status) {
  return status === "จัดส่งแล้ว" || status === "ยกเลิก";
}

function statusOptionsHTML(current) {
  return STATUS_CODES.map(code => `<option value="${code}" ${code === current ? "selected" : ""}>${code}</option>`).join("");
}

function orderRowHTML(o, opts) {
  opts = opts || {};
  const status = o.status || "รอยืนยัน";
  const row = String(o._row || "");
  const id = String(o.id || "");
  const dateLabel = opts.showDate ? (() => {
    const d = getDeliveryDateOnly(o);
    return d ? `<div class="order-date-label">📅 ${formatDateTH(d)}</div>` : "";
  })() : "";
  return `
    <div class="order-row${isFinalStatus(status) ? ' sent' : ''}${opts.urgent ? ' urgent' : ''}">
      <div>
        <div class="order-name">${o.name || "-"}</div>
        ${dateLabel}
        <div class="order-meta">📞 ${o.phone || "-"} &nbsp;·&nbsp; 📍 ${o.address && o.address !== "-" ? o.address : "รับที่ร้าน"}</div>
        <div class="order-items">🛍 ${o.items || "-"}</div>
        ${o.note && o.note !== "-" ? `<div class="order-note">📝 ${o.note}</div>` : ""}
        <select class="status-select status-${status}" data-current="${status}" onchange="updateStatus(this,'${row}','${id}')">${statusOptionsHTML(status)}</select>
      </div>
      <div class="order-total">${o.total}</div>
    </div>`;
}

async function updateStatus(selectEl, row, id) {
  const previous = selectEl.dataset.current || selectEl.value;
  const next = selectEl.value;

  if (!row && !id) {
    alert("บันทึกสถานะไม่สำเร็จ: ไม่พบหมายเลขแถวของออเดอร์นี้ กรุณารีเฟรชหน้าแล้วลองใหม่");
    selectEl.value = previous;
    return;
  }

  selectEl.className = `status-select status-${next}`;
  const orderRow = selectEl.closest(".order-row");
  if (orderRow) orderRow.classList.toggle("sent", isFinalStatus(next));
  selectEl.disabled = true;
  try {
    const token = sessionStorage.getItem("dash_token");
    const res = await fetch(API_BASE + "/api/admin/update-status", {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
      body: JSON.stringify({ row: row ? Number(row) : undefined, id: id || undefined, status: next }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    selectEl.dataset.current = next;
  } catch(e) {
    console.log("Status update failed:", e);
    alert("บันทึกสถานะไม่สำเร็จ กรุณาลองใหม่อีกครั้ง");
    selectEl.value = previous;
    selectEl.className = `status-select status-${previous}`;
    if (orderRow) orderRow.classList.toggle("sent", isFinalStatus(previous));
  } finally {
    selectEl.disabled = false;
  }
}

function todayISO() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

function parseTimestamp(str) {
  if (!str || str === "-") return null;
  // Thai locale format: "D/M/YYYY HH:MM:SS" with Buddhist year (e.g. "2/7/2569 17:37:21")
  // ต้องเช็ค pattern นี้ก่อนเสมอ — new Date(str) ของเบราว์เซอร์จะตีความ "D/M" แบบอเมริกา (M/D)
  // แบบเงียบๆ ทุกครั้งที่ D <= 12 (คือ valid ทั้งสองแบบ) ทำให้ได้วันที่ผิดโดยไม่มี error ให้เห็นเลย
  const m = String(str).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})[,\s]+(\d{1,2}):(\d{2})(?::(\d{2}))?/);
  if (m) {
    const year = parseInt(m[3]) > 2500 ? parseInt(m[3]) - 543 : parseInt(m[3]);
    return new Date(year, parseInt(m[2]) - 1, parseInt(m[1]), parseInt(m[4]), parseInt(m[5]), parseInt(m[6] || 0));
  }
  const d = new Date(str);
  if (!isNaN(d)) {
    if (d.getFullYear() > 2500) {
      return new Date(d.getFullYear() - 543, d.getMonth(), d.getDate(), d.getHours(), d.getMinutes(), d.getSeconds());
    }
    return d;
  }
  return null;
}

function parseTotal(str) {
  return parseInt((str || "0").toString().replace(/[^0-9]/g, "")) || 0;
}

function parseItems(str) {
  return (str || "").split(",").map(s => {
    const m = s.trim().match(/^(.+?)\s*x(\d+)$/i);
    if (!m) return null;
    return { name: m[1].trim(), qty: parseInt(m[2]) };
  }).filter(Boolean);
}

function isTodayOrder(o) {
  if (o.status === "ยกเลิก") return false;
  const today = todayISO();
  if (o.date && o.date !== "-" && String(o.date).slice(0, 10) === today) return true;
  const ts = parseTimestamp(o.timestamp);
  return ts ? ts.toISOString().slice(0, 10) === today : false;
}

function tomorrowISO() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  return d.toISOString().slice(0, 10);
}

// ไม่ fallback ไปใช้ timestamp เหมือน getOrderDate — ใช้เฉพาะ "วันที่ต้องการของ" (o.date)
// ที่ลูกค้าระบุมาจริงๆ เพราะออเดอร์วันนี้ vs พรุ่งนี้/ค้างจัดส่ง ต้องอิงวันที่ตั้งใจจะส่งเท่านั้น
function getDeliveryDateOnly(o) {
  if (!o.date || o.date === "-") return null;
  const d = parseTimestamp(o.date);
  return d ? d.toISOString().slice(0, 10) : null;
}

function isTomorrowOrder(o) {
  if (o.status === "ยกเลิก") return false;
  return getDeliveryDateOnly(o) === tomorrowISO();
}

// ค้างจัดส่ง = มีวันที่ต้องการของระบุไว้ แต่ไม่ใช่วันนี้/พรุ่งนี้ (เลยกำหนดแล้ว หรือสั่งล่วงหน้าไกลกว่านั้น)
// และยังไม่ได้ส่ง — วันนี้/พรุ่งนี้ไม่เอามาซ้ำเพราะมี section ของตัวเองแล้ว
function isOverdueOrder(o) {
  const d = getDeliveryDateOnly(o);
  if (!d) return false;
  if (d >= todayISO() && d <= tomorrowISO()) return false;
  return !isFinalStatus(o.status || "");
}

function formatDateTH(iso) {
  return new Date(iso + "T12:00:00").toLocaleDateString("th-TH", { weekday: "long", day: "numeric", month: "long" });
}

async function loadData() {
  const token = sessionStorage.getItem("dash_token");
  const res = await fetch(API_BASE + "/api/admin/orders", {
    headers: { Authorization: `Bearer ${token}` },
  });
  if (res.status === 401) {
    sessionStorage.removeItem("dash_token");
    location.reload();
    throw new Error("Unauthorized");
  }
  const json = await res.json();
  return (json.orders || []).map(o => {
    const normalized = {};
    Object.keys(o).forEach(k => normalized[k.toLowerCase()] = o[k]);
    return normalized;
  });
}

function render(orders) {
  allOrders = orders;
  const today = todayISO();

  // Summary stats (ไม่กรองตามคำค้นหา — เป็นภาพรวมธุรกิจจริง)
  const totalRevenue = orders.reduce((s, o) => s + parseTotal(o.total), 0);
  const totalOrders = orders.length;
  const todayOrders = orders.filter(isTodayOrder);
  const avgOrder = totalOrders ? Math.round(totalRevenue / totalOrders) : 0;

  // รายการที่แสดงจริง — กรองตามคำค้นหาด้วย
  const todayOrdersFiltered = todayOrders.filter(matchesSearch);

  // รายการรอจัดส่งพรุ่งนี้ — มี "วันที่ต้องการของ" ตรงกับพรุ่งนี้พอดี
  const tomorrowOrders = orders.filter(isTomorrowOrder).filter(matchesSearch);

  // รายการค้างยังรอจัดส่ง — เลยกำหนดแล้ว หรือสั่งล่วงหน้าไกลกว่าพรุ่งนี้ แต่ยังไม่ส่ง
  // เรียงจากวันที่เก่าสุดก่อน เพื่อให้รายการที่ค้างนานที่สุดขึ้นบนสุด
  const overdueOrders = orders.filter(isOverdueOrder).filter(matchesSearch)
    .sort((a, b) => (getDeliveryDateOnly(a) || "").localeCompare(getDeliveryDateOnly(b) || ""));

  // Flavor counts
  const flavorMap = {};
  orders.forEach(o => {
    parseItems(o.items).forEach(({name, qty}) => {
      flavorMap[name] = (flavorMap[name] || 0) + qty;
    });
  });
  const flavors = Object.entries(flavorMap).sort((a,b) => b[1]-a[1]).slice(0, 7);

  // Daily sales — last 14 days
  const dailyMap = {};
  orders.forEach(o => {
    const ts = parseTimestamp(o.timestamp);
    if (!ts) return;
    const d = ts.toISOString().slice(0, 10);
    dailyMap[d] = (dailyMap[d] || 0) + parseTotal(o.total);
  });
  const days = Array.from({ length: 14 }, (_, i) => {
    const d = new Date();
    d.setDate(d.getDate() - (13 - i));
    return d.toISOString().slice(0, 10);
  });
  const dailyLabels = days.map(d => {
    const dt = new Date(d + "T00:00:00");
    return dt.toLocaleDateString("th-TH", { day: "numeric", month: "short" });
  });
  const dailyValues = days.map(d => dailyMap[d] || 0);

  const monthlySeries = computeMonthlySeries(orders);
  const addressStats = buildAddressLeaderboard(orders);
  const last30 = sumInRange(orders, Date.now() - 30 * 86400000, Date.now());

  // Render HTML
  document.getElementById("content").innerHTML = `
    <div class="card">
      <div class="section-header">
        <h3>🚚 รายการจัดส่งวันนี้</h3>
        <span class="count-badge">${todayOrdersFiltered.length} ออเดอร์</span>
      </div>
      ${todayOrdersFiltered.length === 0
        ? '<div class="empty">ยังไม่มีออเดอร์สำหรับวันนี้</div>'
        : todayOrdersFiltered.map(o => orderRowHTML(o)).join("")
      }
    </div>

    <div class="card" style="margin-top:20px;">
      <div class="section-header">
        <h3>📦 รายการรอจัดส่งพรุ่งนี้</h3>
        <span class="count-badge">${tomorrowOrders.length} ออเดอร์</span>
      </div>
      ${tomorrowOrders.length === 0
        ? '<div class="empty">ยังไม่มีออเดอร์รอจัดส่งพรุ่งนี้</div>'
        : tomorrowOrders.map(o => orderRowHTML(o)).join("")
      }
    </div>

    <div class="card${overdueOrders.length ? ' urgent' : ''}" style="margin-top:20px;">
      <div class="section-header">
        <h3>⏰ รายการค้างยังรอจัดส่ง</h3>
        <span class="count-badge${overdueOrders.length ? ' urgent' : ''}">${overdueOrders.length} ออเดอร์</span>
      </div>
      ${overdueOrders.length === 0
        ? '<div class="empty">ไม่มีรายการค้าง</div>'
        : overdueOrders.map(o => orderRowHTML(o, { showDate: true, urgent: true })).join("")
      }
    </div>

    <div class="stats" style="margin-top:20px;">
      <div class="stat-card highlight" onclick="openModal('revenue')">
        <div class="stat-label">ยอดขายรวม ↗</div>
        <div class="stat-value">${totalRevenue.toLocaleString("th-TH")}</div>
        <div class="stat-unit">THB</div>
      </div>
      <div class="stat-card" onclick="openModal('all')">
        <div class="stat-label">ออเดอร์ทั้งหมด ↗</div>
        <div class="stat-value">${totalOrders.toLocaleString()}</div>
        <div class="stat-unit">รายการ</div>
      </div>
      <div class="stat-card" onclick="openModal('today')">
        <div class="stat-label">วันนี้ต้องจัดส่ง ↗</div>
        <div class="stat-value">${todayOrders.length}</div>
        <div class="stat-unit">ออเดอร์</div>
      </div>
      <div class="stat-card" onclick="openModal('flavors')">
        <div class="stat-label">เฉลี่ยต่อออเดอร์ ↗</div>
        <div class="stat-value">${avgOrder.toLocaleString()}</div>
        <div class="stat-unit">THB</div>
      </div>
      <div class="stat-card" onclick="openModal('last30')">
        <div class="stat-label">ยอดขาย 30 วันล่าสุด ↗</div>
        <div class="stat-value">${last30.revenue.toLocaleString("th-TH")}</div>
        <div class="stat-unit">${last30.count} ออเดอร์ · THB</div>
      </div>
    </div>

    <div class="charts">
      <div class="card">
        <h3>📈 ยอดขายรายวัน (14 วันล่าสุด)</h3>
        <canvas id="dailyChart"></canvas>
      </div>
      <div class="card">
        <h3>🏆 รสชาติขายดี</h3>
        <canvas id="flavorChart"></canvas>
      </div>
    </div>

    <div class="card" style="margin-top:20px;">
      <h3>📅 ยอดขายรายเดือน</h3>
      <canvas id="monthlyChart"></canvas>
    </div>

    <div class="card" style="margin-top:20px;">
      <div class="section-header">
        <h3>📍 ที่อยู่สั่งบ่อย</h3>
        <span class="count-badge">${addressStats.total} ที่อยู่</span>
      </div>
      ${addressStats.top.length === 0 ? '<div class="empty">ยังไม่มีข้อมูล</div>' : addressStats.top.map((g, i) => `
        <div class="order-row" style="cursor:pointer" onclick="showAddressHistory(${i})">
          <div>
            <div class="order-name">📍 ${g.address}</div>
            <div class="order-meta">${g.revenue.toLocaleString("th-TH")} THB · ล่าสุด ${g.lastOrder ? g.lastOrder.toLocaleDateString("th-TH", { day: "numeric", month: "short", year: "2-digit" }) : "-"}</div>
          </div>
          <div class="order-total">${g.count} ครั้ง</div>
        </div>`).join("")}
    </div>

    <div class="card" style="margin-top:20px;">
      <h3>📊 เทียบกับช่วงก่อนหน้า</h3>
      ${renderComparisonHTML(orders)}
    </div>
  `;

  // Destroy old charts if re-rendering
  if (dailyChart) dailyChart.destroy();
  if (flavorChart) flavorChart.destroy();
  if (monthlyChart) monthlyChart.destroy();

  dailyChart = new Chart(document.getElementById("dailyChart"), {
    type: "bar",
    data: {
      labels: dailyLabels,
      datasets: [{
        label: "THB",
        data: dailyValues,
        backgroundColor: days.map(d => d === today ? "rgba(42,159,201,1)" : "rgba(42,159,201,0.5)"),
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => ` ${ctx.raw.toLocaleString("th-TH")} THB` }
      }},
      scales: {
        y: { beginAtZero: true, ticks: { callback: v => v.toLocaleString("th-TH") } },
        x: { ticks: { font: { size: 10 } } }
      }
    }
  });

  flavorChart = new Chart(document.getElementById("flavorChart"), {
    type: "bar",
    data: {
      labels: flavors.map(([name]) => name),
      datasets: [{
        data: flavors.map(([,qty]) => qty),
        backgroundColor: "rgba(212,166,74,0.75)",
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      indexAxis: "y",
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { beginAtZero: true, ticks: { stepSize: 1 } },
        y: { ticks: { font: { size: 12 } } }
      }
    }
  });

  monthlyChart = new Chart(document.getElementById("monthlyChart"), {
    type: "bar",
    data: {
      labels: monthlySeries.labels,
      datasets: [{
        data: monthlySeries.data,
        backgroundColor: "rgba(30,122,156,0.65)",
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => ` ${ctx.raw.toLocaleString("th-TH")} THB` }
      }},
      scales: {
        y: { beginAtZero: true, ticks: { callback: v => v.toLocaleString("th-TH") } },
        x: { ticks: { font: { size: 10 } } }
      }
    }
  });

  const now = new Date().toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" });
  document.getElementById("lastUpdated").textContent = `อัพเดต ${now} น.`;
}

let refreshTimer;
async function init() {
  clearTimeout(refreshTimer);
  document.getElementById("lastUpdated").textContent = "กำลังโหลด...";
  try {
    const orders = await loadData();
    render(orders);
    // Auto-refresh every 5 min
    refreshTimer = setTimeout(init, 5 * 60 * 1000);
  } catch(e) {
    document.getElementById("content").innerHTML = `
      <div class="error-state">
        โหลดข้อมูลไม่ได้ — ตรวจสอบว่า Apps Script deploy ถูกต้องและตั้งสิทธิ์เป็น <b>"ทุกคน"</b><br><br>
        <button onclick="init()" style="margin-top:12px;padding:8px 20px;border-radius:8px;border:none;background:#c0392b;color:#fff;cursor:pointer;font-weight:700;">ลองใหม่</button>
      </div>`;
  }
}

if (sessionStorage.getItem("dash_token")) init();

// Register service worker so the admin dashboard can be installed as an app
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
}
</script>
